name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Clears that warning
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

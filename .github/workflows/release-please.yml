name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # Standard GITHUB_TOKEN works perfectly for basic setups
          token: ${{ secrets.GITHUB_TOKEN }}

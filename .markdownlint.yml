default: true

# Hugo front matter supplies page titles, and the site mixes docs, legal pages,
# and long-form essays. Keep structure checks, but do not lint prose wrapping.
MD013: false
MD024:
  siblings_only: true
MD026:
  punctuation: ".,;!。，；！"
MD033: false
MD034: false
MD036: false
MD040: false
MD041:
  allow_preamble: true
  front_matter_title: "^\\s*title\\s*[:=]"
MD052:
  shortcut_syntax: false
  ignored_labels:
    - "x"
MD053:
  ignored_definitions:
    - "//"

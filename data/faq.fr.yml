intro: "Questions frequentes sur l'exploitation, la securisation et la mise a jour d'une instance vanityURLs."
groups:
  - title: "Configuration et hebergement"
    items:
      - question: "v8s est-il un raccourcisseur heberge?"
        answer: |-
          Non. v8s est un logiciel pour operer votre propre moteur de liens courts sur votre propre domaine et compte Cloudflare. Votre depot Git, Worker Cloudflare, zone DNS, pages legales et destinations restent votre responsabilite.

      - question: "L'instance publique v8s.link est-elle prete?"
        answer: |-
          Pas encore. Le travail actuel prepare le code, les defaults, le modele securite, la documentation, le processus de mise a jour et les controles anti-abus pour lancer une instance publique avec une base responsable.

      - question: "Quels menus Cloudflare comptent?"
        answer: |-
          Il y a trois endroits a connaitre :

          - Zero Trust pour les applications Access, politiques, identity providers et reglages Zero Trust
          - Workers & Pages pour le Worker, binding assets, variables, observabilite, domaines et reglages de build
          - la zone de configuration du domaine pour DNS, SSL/TLS, WAF, Security, AI Crawl Control, Rules, Network, Caching et analytics

      - question: "Qui est responsable des conditions et pages de confidentialite?"
        answer: |-
          Le proprietaire de l'instance. Le depot peut fournir des brouillons et une structure, mais ce n'est pas un avis juridique. Les proprietaires doivent adapter conditions, confidentialite, abus et contact securite a leur audience et juridiction.

  - title: "Liens et operations"
    items:
      - question: "Faut-il encore modifier v8s-schedules.json a la main?"
        answer: |-
          Habituellement non. Utilisez `./scripts/lnk schedule add`, `./scripts/lnk schedule default` et `./scripts/lnk schedule list` pour le travail courant. Vous pouvez definir une cible fallback pendant l'ajout d'une regle avec `--default`. Les edits JSON restent utiles pour les changements de masse ou les changements qui se relisent mieux directement en code review.

      - question: "La CLI demande-t-elle Bash?"
        answer: |-
          Non. La CLI principale, `./scripts/lnk`, est basee sur Node et fonctionne sur macOS, Linux, Windows et les environnements CI avec Node et Git. Le helper optionnel `scripts/v8s.zsh` demande Zsh, mais c'est seulement une convenience pour ouvrir des redirections existantes.

      - question: "Quels fichiers lnk modifie-t-il?"
        answer: |-
          `lnk` modifie les fichiers source dans `custom/`. Les commandes de liens ecrivent dans `custom/v8s-links.txt`, en le creant si necessaire. Les commandes de politique ecrivent dans `custom/v8s-policies.json`.

          Apres un edit avec `lnk`, lancez `npm run build`, `npm run check` ou `npm run local-publish` pour valider et publier le changement.

      - question: "A quoi sert npm run local-publish?"
        answer: |-
          `npm run local-publish` est le workflow local pratique pour les changements d'instance valides. Il lance les checks, stage les chemins configures, commit et push. Par defaut il se concentre sur `custom/`, donc les sorties generees `build/`, `src/` et `functions/` devraient rester hors Git.

  - title: "Runtime et securite"
    items:
      - question: "Pourquoi utiliser un registre JSON genere plutot qu'une base de donnees?"
        answer: |-
          Le runtime doit rester petit. Un registre genere est facile a valider, auditer, comparer, restaurer et deployer. Une base de donnees pourra etre ajoutee plus tard seulement si l'edition deleguee justifie le cout operationnel.

      - question: "Pourquoi WAF et controles bot sont-ils necessaires pour une instance personnelle discrete?"
        answer: |-
          Les domaines courts recoivent du trafic scanner et bot meme quand personne ne les a annonces. Bloquer l'abus evident avant le Worker protege CPU, quota analytics, reputation et logs.

      - question: "v8s utilise-t-il des analytics cote client?"
        answer: |-
          Non. Le modele recommande est l'analytics serveur depuis le Worker vers Umami ou Fathom. N'ajoutez pas de scripts de tracking navigateur sauf si votre propre posture legale/confidentialite le permet explicitement.

      - question: "Puis-je utiliser v8s pour des liens affilies ou du tracking de campagne?"
        answer: |-
          Seulement si la destination et la divulgation sont honnetes. N'utilisez pas un redirecteur pour cacher des destinations malveillantes, blanchir une chaine de raccourcisseurs, dissimuler du tracking ou envoyer les gens vers un endroit qu'ils ne pouvaient pas raisonnablement attendre.

      - question: "Pourquoi le fichier source s'appelle-t-il v8s-policies.json alors que le runtime s'appelle v8s-blocklist.json?"
        answer: |-
          Le fichier source porte le nom du modele de politique plus large : domaines bloques, domaines autorises, regles de mots-cles, controles de scanners et autres decisions de confiance et securite. Le Worker consomme encore l'artefact genere `build/v8s-blocklist.json`, optimise pour le blocage runtime.

          Utilisez `defaults/v8s-policies.json` et `custom/v8s-policies.json` pour les edits source. Traitez `build/v8s-blocklist.json` comme une sortie generee.

      - question: "Est-ce que custom/v8s-policies.json fusionne avec la politique par defaut?"
        answer: |-
          Non. La politique source custom remplace la politique source par defaut pour les decisions de l'instance. Cela evite que des elements retires localement reviennent silencieusement par fusion avec les defaults. Les anciens noms `v8s-blocklist.json` peuvent encore etre reconnus pour migration, mais les nouvelles instances et la documentation devraient utiliser `v8s-policies.json`.

  - title: "Personnalisation et langues"
    items:
      - question: "Pourquoi l'anglais et le francais ont-ils plus de liens en bas de page?"
        answer: |-
          L'anglais et le francais incluent actuellement des pages par defaut pour confidentialite, conditions, abus et securite. L'espagnol, l'italien et l'allemand incluent les pages d'accueil, expand et etat localisees, mais pas encore les pages de politique equivalentes. Le build ne lie que les pages qui existent pour la langue concernee.

      - question: "Comment choisir les langues supportees par mon instance?"
        answer: |-
          Definissez `i18n.supported_languages` dans `custom/v8s-site-config.json`. C'est important des que vous personnalisez `custom/public/`, sinon les visiteurs peuvent voir une instance mixte ou une langue est personnalisee mais les autres repertoires de langue par defaut restent presents.

          Le build utilise cette liste pour ajuster le routage linguistique du Worker, construire la page de tests protegee et retirer les repertoires de langues non supportees de la sortie generee.

      - question: "Que se passe-t-il lorsque setup copie les pages par defaut dans custom/public?"
        answer: |-
          `npm run setup` peut demander le domaine court, les langues supportees et le wordmark en deux couleurs. Si vous acceptez l'option de pages marquees, il copie `defaults/public/` dans `custom/public/`, remplace le wordmark, met a jour les libelles et liens de marque pertinents, retire les langues non supportees et stocke ces decisions dans `custom/v8s-site-config.json`.

          Si `custom/public/` contient deja des edits du proprietaire et n'a pas ete marque comme gere par l'installateur, setup refuse de le remplacer sauf avec `--force`.

      - question: "Ou vivent les badges rediriges localises?"
        answer: |-
          Les badges par defaut vivent sous `defaults/public/{en,fr,es,it,de}/` comme `v8s-redirected.svg` et `v8s-redirected-dark.svg`. L'anglais est aussi copie a la racine publique pendant le build pour compatibilite avec les pages racine.

          Lancez `npm run optimize:badges` pour reproduire le nettoyage SVGO de ces SVG.

  - title: "Mises a jour et fichiers source"
    items:
      - question: "Quelle est la difference entre build/v8s.json et ~/.v8s.json?"
        answer: |-
          `build/v8s.json` est le registre genere dans le depot. Il est retire par `npm run clean`.

          `~/.v8s.json`, ou le chemin local configure, est un cache de poste de travail utilise par le helper shell optionnel. Il peut survivre a `npm run clean` parce qu'il est en dehors de la sortie de build du depot.

      - question: "Comment garder une instance a jour?"
        answer: |-
          Gardez les fichiers locaux dans `custom/`, lancez `npm run clean`, utilisez le workflow de mise a jour pour rafraichir `defaults/` et `scripts/`, puis lancez `npm run check` avant de deployer.

      - question: "Que faut-il commiter?"
        answer: |-
          Commitez les sources et changements `custom/`. Ne commitez pas les sorties generees `build/`, `src/` ou `functions/`. La commande clean retire ces repertoires generes.

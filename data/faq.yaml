- id: protected-operational-paths
  question: Which paths should Cloudflare Access protect?
  category: trust-safety
  audience: [operator]
  priority: high
  evidence:
    - repo: vanityURLs/code
      path: scripts/workers/worker.mjs
      note: "Localized stats and tests paths require Cloudflare Access JWT validation; legacy `/_stats` redirects to `/en/_stats/`."
    - repo: vanityURLs/website
      path: content/docs/customize/access-control.en.md
      note: "Access control docs describe protecting operational surfaces."
  answer: >
    The Worker treats localized stats paths such as `/en/_stats/` and `/fr/_stats/`, localized tests paths such as `/en/_tests/` and `/fr/_tests/`, plus root `/_tests`, as protected operational paths. Configure the Cloudflare Access application for `*/_stats`, `*/_stats/*`, `*/_tests`, `*/_tests/*`, `/_tests`, and `/_tests/*` path patterns. Legacy `/_stats` redirects to `/en/_stats/`. If `CF_ACCESS_TEAM_DOMAIN` or `CF_ACCESS_AUD` is missing, protected paths fail closed with `503` instead of becoming public.
  related: [cloudflare-access-jwt, runtime-security-layers]
  tags: [cloudflare-access, protected-paths, trust-safety]
  last_reviewed: 2026-05-27
  reviewed_against: { code: f1c997f, website: 79f31f6 }


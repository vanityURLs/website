- id: stateless-architecture
  question: How does vanityURLs work without a database?
  category: architecture
  audience: [operator, contributor]
  priority: high
  evidence:
    - repo: vanityURLs/code
      path: README.md
      note: "Links, schedules, destination policies, localized pages, and operator configuration live in Git."
    - repo: vanityURLs/code
      path: scripts/build.mjs
      note: "Build writes build/v8s.json, build/v8s-blocklist.json, and build/v8s-site-config.json for the Worker."
  answer: >
    vanityURLs compiles link and policy source files into static runtime JSON that the Cloudflare Worker reads from the Static Assets binding. There is no account database or mutable click store in the default runtime; Git is the system of record.

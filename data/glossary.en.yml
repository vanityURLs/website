terms:
  - id: access-application
    term: Access application
    definition: A Cloudflare Zero Trust application that protects selected paths, such as `/_stats/*` and `/_tests/*`, before the Worker serves those pages.
  - id: access-policy
    term: Access policy
    definition: A Cloudflare Zero Trust rule that decides which identities can reach a protected Access application.
  - id: block-policy
    term: Block policy
    definition: The instance-owned rules in `custom/v8s-policies.json` that block unsafe domains, keywords, scanner paths, or unwanted traffic before redirect lookup.
  - id: build-artifact
    term: Build artifact
    definition: A generated file under `build/` or `src/`. Edit source files in `custom/` or `defaults/`, then rebuild instead of editing artifacts directly.
  - id: custom-overlay
    term: Custom overlay
    definition: The instance-owned layer under `custom/`. It overrides or extends product defaults without editing upstream files.
  - id: default-target
    term: Default target
    definition: The fallback destination used by a scheduled link when no time-based rule is currently active.
  - id: destination
    term: Destination
    definition: The long URL a short link redirects to. In the link format, it is stored in the `target` column.
  - id: generated-registry
    term: Generated registry
    definition: The runtime redirect registry written to `build/v8s.json` during build from links, inline schedules, policies, and configuration.
  - id: identity-provider
    term: Identity provider
    definition: A login source used by Cloudflare Access, such as GitHub, Google, or one-time PIN, to confirm who is trying to reach a protected page.
  - id: idempotent
    term: Idempotent
    definition: A command or operation that can be run repeatedly with the same inputs without creating duplicate state or requiring a fresh setup. In vanityURLs, `npm run setup` rereads existing answers and updates the same generated files.
  - id: idna
    term: IDNA
    definition: Internationalized Domain Names in Applications, the standard that lets software represent non-ASCII domain names in DNS-compatible ASCII form.
  - id: link-registry
    term: Link registry
    definition: The set of short-link records used by vanityURLs. Humans edit `custom/v8s-links.txt`; the build produces the generated registry consumed by the Worker.
  - id: operator
    term: Operator
    definition: The person, team, or organization responsible for the vanityURLs instance, public pages, trust contacts, and legal-page configuration.
  - id: owner-label
    term: Owner label
    definition: A short internal value in `v8s-links.txt` that identifies the person or team accountable for a link.
  - id: punycode
    term: Punycode
    definition: The ASCII encoding used by IDNA for internationalized domain labels, usually visible with the `xn--` prefix.
  - id: random-slug
    term: Random slug
    definition: A slug generated by `lnk` when you provide a destination but do not choose the short path yourself.
  - id: route
    term: Route
    definition: The Cloudflare Workers mapping that sends requests for your short domain to the vanityURLs Worker.
  - id: runtime
    term: Runtime
    definition: The Cloudflare Worker and static assets that serve redirects and pages after build and deployment.
  - id: scheduled-link
    term: Scheduled link
    definition: A short link whose destination can change by day, time window, and timezone using inline `@schedule` rules in `v8s-links.txt`.
  - id: short-domain
    term: Short domain
    definition: The domain used for redirects, such as `v8s.link` or `go.example.com`.
  - id: slug
    term: Slug
    definition: The path after your short domain. In `https://v8s.link/docs`, the slug is `docs`.
  - id: splat-link
    term: Splat link
    definition: A link stored as `slug/*` that forwards the remaining path into a destination containing `:splat`.
  - id: tag
    term: Tag
    definition: A comma-separated label on a link row used to group links, describe purpose, or select tag-specific random slug lengths.
  - id: worker
    term: Worker
    definition: The Cloudflare Workers application that runs the vanityURLs redirector.

abbreviations:
  - id: adr
    abbr: ADR
    term: Architecture Decision Record
    definition: A short document that records an implementation decision and the reason behind it.
  - id: api
    abbr: API
    term: Application Programming Interface
    definition: A documented interface that software can call, such as an analytics or provider endpoint.
  - id: cli
    abbr: CLI
    term: Command Line Interface
    definition: A terminal command interface, such as the `lnk` helper used to manage links.
  - id: ci
    abbr: CI
    term: Continuous Integration
    definition: Automated checks that run before code is merged or deployed.
  - id: csp
    abbr: CSP
    term: Content Security Policy
    definition: Browser security rules that limit which scripts, styles, images, and connections a page may use.
  - id: dns
    abbr: DNS
    term: Domain Name System
    definition: The system that maps hostnames to network destinations and lets Cloudflare route your short domain.
  - id: gdpr
    abbr: GDPR
    term: General Data Protection Regulation
    definition: European Union privacy regulation that may affect operators handling personal data from EU visitors.
  - id: html
    abbr: HTML
    term: HyperText Markup Language
    definition: The markup language used for web pages.
  - id: http
    abbr: HTTP
    term: Hypertext Transfer Protocol
    definition: The protocol used by browsers, clients, and Workers to request and return web resources.
  - id: ip
    abbr: IP
    term: Internet Protocol
    definition: Network addressing used to route traffic; analytics and logs may include visitor IP addresses.
  - id: json
    abbr: JSON
    term: JavaScript Object Notation
    definition: A structured data format used by vanityURLs for generated registries and configuration files.
  - id: otp
    abbr: OTP
    term: One-Time PIN
    definition: A temporary login code that Cloudflare Access can send directly to an approved email address.
  - id: qr
    abbr: QR
    term: Quick Response
    definition: A scannable barcode format often used to share short links in print or slides.
  - id: rfc
    abbr: RFC
    term: Request for Comments
    definition: A standards-track or informational publication, such as RFC 9116 for `security.txt`.
  - id: sla
    abbr: SLA
    term: Service-Level Agreement
    definition: A formal service commitment; vanityURLs docs warn operators not to promise one casually.
  - id: tls
    abbr: TLS
    term: Transport Layer Security
    definition: The encryption protocol behind HTTPS.
  - id: url
    abbr: URL
    term: Uniform Resource Locator
    definition: The address of a web resource, including the protocol, host, path, and optional query string.
  - id: utm
    abbr: UTM
    term: Urchin Tracking Module
    definition: Campaign query parameters used by analytics tools.
  - id: vdp
    abbr: VDP
    term: Vulnerability Disclosure Policy
    definition: A policy that explains how security researchers should report vulnerabilities.
  - id: waf
    abbr: WAF
    term: Web Application Firewall
    definition: Cloudflare edge rules that block suspicious or abusive traffic before it reaches the Worker.
  - id: yaml
    abbr: YAML
    term: YAML Ain't Markup Language
    definition: A human-readable structured data format used by the documentation site for data and configuration.

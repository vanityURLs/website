terms:
  - id: access-application
    term: Application Access
    definition: Une application Cloudflare Zero Trust qui protège certains chemins, comme les chemins stats localisés `/en/_stats/` et `/fr/_stats/`, ainsi que `/_tests/*`, avant que le Worker serve ces pages.
  - id: access-policy
    term: Politique Access
    definition: Une règle Cloudflare Zero Trust qui decide quelles identités peuvent atteindre une application Access protégée.
  - id: block-policy
    term: Politique de blocage
    definition: Les règles propres à l'instance dans `custom/v8s-policies.json` qui bloquent les domaines dangereux, mots-cles, chemins de scanner ou trafic indesirable avant la recherche de redirection.
  - id: build-artifact
    term: Artefact de build
    definition: Un fichier génère sous `build/` ou `src/`. Modifiez les fichiers source dans `custom/` ou `defaults/`, puis reconstruisez au lieu de modifier les artefacts directement.
  - id: custom-overlay
    term: Overlay custom
    definition: La couche propre à l'instance sous `custom/`. Elle remplace ou éténd les defaults produit sans modifier les fichiers upstream.
  - id: default-target
    term: Cible par défaut
    definition: La destination fallback utilisee par un lien planifié lorsqu'aucune règle horaire n'est active.
  - id: destination
    term: Destination
    definition: La longue URL vers laquelle un lien court redirige. Dans le format de lien, elle est stockee dans la colonne `target`.
  - id: generated-registry
    term: Registre génère
    definition: Le registre runtime de redirection écrit dans `build/v8s.json` pendant le build à partir des liens, horaires, politiques et configurations.
  - id: identity-provider
    term: Fournisseur d'identité
    definition: Une source de connexion utilisee par Cloudflare Access, comme GitHub, Google ou un code à usage unique, pour confirmer qui essaie d'acceder à une page protégée.
  - id: idempotent
    term: Idempotent
    definition: Une commande ou opération qui peut être relancee avec les mêmes entrées sans créer d'état en double ni exiger une nouvelle installation. Dans vanityURLs, `npm run setup` relit les réponses existantes et met à jour les mêmes fichiers génères.
  - id: idna
    term: IDNA
    definition: Internationalized Domain Names in Applications, le standard qui permet aux logiciels de représenter les noms de domaine non ASCII dans une forme ASCII compatible avec DNS.
  - id: link-registry
    term: Registre de liens
    definition: L'ensemble des enregistrements de liens courts utilisés par vanityURLs. Les humains modifient `custom/v8s-links.txt`; le build produit le registre génère consomme par le Worker.
  - id: operator
    term: Operateur
    definition: La personne, l'équipe ou l'organisation responsable de l'instance vanityURLs, des pages publiques, des contacts de confiance et de la configuration des pages légales.
  - id: owner-label
    term: Libelle owner
    definition: Une courte valeur interne dans `v8s-links.txt` qui identifie la personne ou l'équipe responsable d'un lien.
  - id: punycode
    term: Punycode
    definition: L'encodage ASCII utilisé par IDNA pour les libellés de domaine internationalisés, généralement visible avec le préfixe `xn--`.
  - id: random-slug
    term: Slug aléatoire
    definition: Un slug génère par `lnk` lorsque vous fournissez une destination sans choisir vous-même le chemin court.
  - id: route
    term: Route
    definition: Le mappage Cloudflare Workers qui envoie les requêtes pour votre domaine court vers le Worker vanityURLs.
  - id: runtime
    term: Runtime
    definition: Le Worker Cloudflare et les assets statiques qui servent les redirections et les pages après le build et le déploiement.
  - id: scheduled-link
    term: Lien planifié
    definition: Un lien court dont la destination peut changer selon le jour, la fenêtre horaire et le fuseau horaire avec des règles `@schedule` inline dans `v8s-links.txt`.
  - id: short-domain
    term: Domaine court
    definition: Le domaine utilise pour les redirections, comme `v8s.link` ou `go.example.com`.
  - id: slug
    term: Slug
    definition: Le chemin après votre domaine court. Dans `https://v8s.link/docs`, le slug est `docs`.
  - id: splat-link
    term: Lien splat
    definition: Un lien stocke comme `slug/*` qui transmet le reste du chemin dans une destination contenant `:splat`.
  - id: tag
    term: Tag
    definition: Un libellé séparé par virgules sur une ligne de lien, utilise pour grouper les liens, décrire l'intention ou choisir des longueurs de slugs aléatoires propres aux tags.
  - id: worker
    term: Worker
    definition: L'application Cloudflare Workers qui exécute le redirecteur vanityURLs.

abbreviations:
  - id: adr
    abbr: ADR
    term: Architecture Decision Record
    definition: Un court document qui enregistre une décision d'implementation et sa raison.
  - id: api
    abbr: API
    term: Application Programming Interface
    definition: Une interface documentee qu'un logiciel peut appeler, comme un endpoint analytics ou fournisseur.
  - id: cli
    abbr: CLI
    term: Command Line Interface
    definition: Une interface de commande en terminal, comme le helper `lnk` utilise pour gerer les liens.
  - id: ci
    abbr: CI
    term: Continuous Integration
    definition: Des verifications automatisees lancees avant fusion ou déploiement.
  - id: csp
    abbr: CSP
    term: Content Security Policy
    definition: Des règles de sécurité navigateur qui limitent les scripts, styles, images et connexions qu'une page peut utiliser.
  - id: dns
    abbr: DNS
    term: Domain Name System
    definition: Le système qui associe les noms d'hote aux destinations réseau et permet a Cloudflare de router votre domaine court.
  - id: gdpr
    abbr: GDPR
    term: General Data Protection Regulation
    definition: Reglement europeen sur la protection des données qui peut concerner les opérateurs traitant des données personnelles de visiteurs de l'UE.
  - id: html
    abbr: HTML
    term: HyperText Markup Language
    definition: Le langage de balisage utilise pour les pages web.
  - id: http
    abbr: HTTP
    term: Hypertext Transfer Protocol
    definition: Le protocole utilisé par les navigateurs, clients et Workers pour demander et retourner des ressources web.
  - id: ip
    abbr: IP
    term: Internet Protocol
    definition: L'adressage réseau utilise pour router le trafic; les analytics et logs peuvent inclure des adresses IP visiteur.
  - id: json
    abbr: JSON
    term: JavaScript Object Notation
    definition: Un format de données structurees utilisé par vanityURLs pour les registres génères et les fichiers de configuration.
  - id: otp
    abbr: OTP
    term: One-Time PIN
    definition: Un code de connexion temporaire que Cloudflare Access peut envoyér directement à une adresse courriel autorisee.
  - id: qr
    abbr: QR
    term: Quick Response
    definition: Un format de code-barres scannable souvent utilise pour partager des liens courts sur papier ou dans des diapositives.
  - id: rfc
    abbr: RFC
    term: Request for Comments
    definition: Une publication de standard ou d'information, comme RFC 9116 pour `security.txt`.
  - id: sla
    abbr: SLA
    term: Service-Level Agreement
    definition: Un engagement de service formel; la documentation vanityURLs recommande de ne pas en promettre un à la legere.
  - id: tls
    abbr: TLS
    term: Transport Layer Security
    definition: Le protocole de chiffrement derrière HTTPS.
  - id: url
    abbr: URL
    term: Uniform Resource Locator
    definition: L'adresse d'une ressource web, incluant le protocole, l'hote, le chemin et une eventuelle query string.
  - id: utm
    abbr: UTM
    term: Urchin Tracking Module
    definition: Des paramêtres de campagne dans l'URL utilisés par les outils analytics.
  - id: vdp
    abbr: VDP
    term: Vulnerability Disclosure Policy
    definition: Une politique qui explique comment les chercheurs en sécurité devraient signaler les vulnérabilités.
  - id: waf
    abbr: WAF
    term: Web Application Firewall
    definition: Des règles edge Cloudflare qui bloquent le trafic suspect ou abusif avant qu'il atteigne le Worker.
  - id: yaml
    abbr: YAML
    term: YAML Ain't Markup Language
    definition: Un format de données structurees lisible par les humains, utilisé par le site de documentation pour les données et la configuration.

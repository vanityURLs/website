cta_get_started: "Get Started"
cta_view_github: "View on GitHub"

features_title: "Everything you need, nothing you don't"
features_subtitle: "A Git-native, edge-delivered short URL platform with full control and zero lock-in"
features:
  - icon: "M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"
    title: "Links live in Git"
    desc:  "Review every redirect like code: owner, state, expiry, notes, and history in one plain file."
  - icon: "M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
    title: "CLI when you need speed"
    desc:  "Create exact, random, scheduled, and tagged links without opening another dashboard."
  - icon: "M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
    title: "Runs at the edge"
    desc:  "Serve redirects from Cloudflare Workers with static assets and no origin server to babysit."
  - icon: "M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
    title: "Lifecycle-aware links"
    desc:  "Mark links permanent, ephemeral, expired, disabled, maintenance, or deactivated instead of guessing later."
  - icon: "M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"
    title: "Private operator pages"
    desc:  "Keep stats, tests, and operational surfaces behind Cloudflare Access while redirects stay public."
  - icon: "M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"
    title: "No SaaS handcuffs"
    desc:  "Own the domain, data, repository, and deployment path. Leave when you want, boringly."

how_it_works_title: "How it works"
how_it_works_subtitle: "From zero to live short links in four steps"
steps:
  - n: "1"
    title: "Buy a domain"
    desc:  "Register any domain you like, such as v8s.link, or bring one you already own"
  - n: "2"
    title: "Define links in v8s-links.txt"
    desc:  "Add pipe-delimited link rows with slug, target, state, metadata, owner, expiry, and notes"
  - n: "3"
    title: "Deploy as a Cloudflare Worker"
    desc:  "Wrangler builds defaults plus custom overrides, publishes static assets, and routes through the Worker"
  - n: "4"
    title: "Commit changes to deploy globally"
    desc:  "Every git push triggers an automatic deploy. Your changes are live worldwide in ~15 seconds — no manual steps, no dashboards, no waiting"

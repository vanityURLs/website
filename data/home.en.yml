how_it_works_title: "How it works"
how_it_works_subtitle: "From zero to live short links in four steps"
steps:
  - n: "1"
    title: "Buy a domain"
    desc:  "Register any domain you like, such as v8s.link, or bring one you already own"
  - n: "2"
    title: "Define links in v8s-links.txt"
    desc:  "Add pipe-delimited link rows with slug, target, state, metadata, owner, expiry, and notes"
  - n: "3"
    title: "Deploy as a Cloudflare Worker"
    desc:  "Wrangler builds defaults plus custom overrides, publishes static assets, and routes through the Worker"
  - n: "4"
    title: "Commit changes to deploy globally"
    desc:  "Every git push triggers an automatic deploy. Your changes are live worldwide in ~15 seconds — no manual steps, no dashboards, no waiting"

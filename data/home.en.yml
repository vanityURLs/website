how_it_works_title: "How it works"
how_it_works_subtitle: "From zero to live short links in four steps"
steps:
  - n: "1"
    title: "Buy a domain"
    desc:  "Register any short domain you like — your-name.link, your-brand.io — via Cloudflare or any registrar. Bring your own if you already have one"
  - n: "2"
    title: "Define links in your Git repository"
    desc:  "Add your redirect rules to a plain-text file in a GitHub repository. One line per link — no database, no UI, just text you control"
  - n: "3"
    title: "Connect via Cloudflare Pages"
    desc:  "Link your repository to Cloudflare Pages with a single build command. Cloudflare handles SSL, edge caching, and redirect processing at the network level"
  - n: "4"
    title: "Commit changes to deploy globally"
    desc:  "Every git push triggers an automatic deploy. Your changes are live worldwide in ~15 seconds — no manual steps, no dashboards, no waiting"

how_it_works_title: "Comment ça fonctionne"
how_it_works_subtitle: "De zéro à des liens courts en direct en quatre étapes"
steps:
  - n: "1"
    title: "Achetez un domaine"
    desc:  "Enregistrez n'importe quel domaine court qui vous plaît — votre-nom.link, votre-marque.io — via Cloudflare ou un autre registraire. Apportez le vôtre si vous en avez déjà un"
  - n: "2"
    title: "Définissez les liens dans votre dépôt Git"
    desc:  "Ajoutez vos règles de redirection dans un fichier texte dans un dépôt GitHub. Une ligne par lien — aucune base de données, aucune interface, juste du texte sous votre contrôle"
  - n: "3"
    title: "Connectez-vous à Cloudflare Pages"
    desc:  "Reliez votre dépôt à Cloudflare Pages en une seule commande de build. Cloudflare gère le SSL, la mise en cache à l'edge et le traitement des redirections au niveau réseau"
  - n: "4"
    title: "Publiez vos changements mondialement"
    desc:  "Chaque git push déclenche un déploiement automatique. Vos changements sont en ligne partout dans le monde en ~15 secondes — aucune étape manuelle, aucun tableau de bord, aucune attente"

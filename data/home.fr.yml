features_title: "Tout ce dont vous avez besoin, rien de superflu"
features_subtitle: "Une plateforme d'URL courtes native de Git et déployée en périphérie, avec contrôle total et zéro lock-in"
features:
  - icon: "M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"
    title: "Les liens vivent dans Git"
    desc:  "Revisez chaque redirection comme du code : proprietaire, etat, expiration, notes et historique dans un fichier."
  - icon: "M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
    title: "CLI quand ca presse"
    desc:  "Creez des liens exacts, aleatoires, planifies et tagues sans ouvrir un autre tableau de bord."
  - icon: "M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
    title: "Tourne a l'edge"
    desc:  "Servez les redirections avec Cloudflare Workers, des assets statiques et aucun serveur d'origine a garder en vie."
  - icon: "M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
    title: "Liens avec cycle de vie"
    desc:  "Marquez les liens permanent, ephemeral, expired, disabled, maintenance ou deactivated au lieu de deviner plus tard."
  - icon: "M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"
    title: "Pages operateur privees"
    desc:  "Gardez stats, tests et surfaces operationnelles derriere Cloudflare Access pendant que les redirections restent publiques."
  - icon: "M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"
    title: "Pas de menottes SaaS"
    desc:  "Possedez le domaine, les donnees, le depot et le chemin de deploiement. Partez quand vous voulez, sans drame."

how_it_works_title: "Comment ça fonctionne"
how_it_works_subtitle: "De zéro à des liens courts en direct en quatre étapes"
steps:
  - n: "1"
    title: "Achetez un domaine"
    desc:  "Enregistrez un domaine court comme v8s.link, ou apportez un domaine que vous possedez deja"
  - n: "2"
    title: "Definissez les liens dans v8s-links.txt"
    desc:  "Ajoutez des lignes avec slug, cible, etat, metadonnees, proprietaire, expiration et notes"
  - n: "3"
    title: "Deployez comme Worker Cloudflare"
    desc:  "Wrangler construit les defaults, applique les surcharges custom, publie les assets, et route via le Worker"
  - n: "4"
    title: "Publiez vos changements mondialement"
    desc:  "Chaque git push déclenche un déploiement automatique. Vos changements sont en ligne partout dans le monde en ~15 secondes — aucune étape manuelle, aucun tableau de bord, aucune attente"

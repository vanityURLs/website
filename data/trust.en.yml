hero: "vanityURLs.link is a website for an open-source project, we strive to be trustworthy stewards."
hero2: "Want to verify everything yourself? The source code for this site is fully public at `github.com/vanityURLs/website`. Every configuration, template, and security header is readable and auditable. There is nothing to hide."
 

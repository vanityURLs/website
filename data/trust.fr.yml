hero: "vanityURLs.link est le site d'un projet open source. Nous nous efforçons d'être des gardiens dignes de confiance des données et de l'attention de chaque visiteur."
hero2: "Vous voulez tout vérifier vous-même ? Le code source de ce site est entièrement public sur `github.com/vanityURLs/website`. Chaque en-tête, chaque gabarit et chaque Worker est lisible et vérifiable. Rien à cacher."

section1Title: "Nos engagements"

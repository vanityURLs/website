baseURL: "https://brand.vanityurls.link/"
title: "vanityURLs Brand"

min_version: "0.158.0"

contentDir: "brand-content"
enableRobotsTXT: true
disableHugoGeneratorInject: false
enableGitInfo: true
defaultContentLanguage: en
defaultContentLanguageInSubdir: false
disableKinds:
  - taxonomy
  - term

languages:
  en:
    locale: en-CA
    label: English
    weight: 1
    params:
      description: "Brand standards and design system for vanityURLs"
      footer:
        col2:
          title: Standards
          links:
            - name: Design Language
              url: /design-language/
            - name: Logo
              url: /logo/
        col3:
          title: Resources
          links:
            - name: Brand & assets
              url: /resources/downloads/
            - name: Social Media
              url: /resources/social-media/
        col4:
          title: Project
          links:
            - name: Web Site Docs
              url: /web-site/
            - name: Main Site
              url: https://www.vanityurls.link/
              external: true
            - name: Source Code
              url: https://github.com/vanityURLs/website
              external: true
    menu:
      main:
        - name: Design Language
          pageRef: /design-language
          weight: 1
        - name: Logo
          pageRef: /logo
          weight: 2
        - name: Resources
          pageRef: /resources
          weight: 3
        - name: Product UI
          pageRef: /product-ui
          weight: 4
        - name: Web Site
          pageRef: /web-site
          weight: 5
  fr:
    locale: fr-CA
    label: Francais
    weight: 2
    params:
      description: "Normes de marque et systeme de design pour vanityURLs"
      footer:
        col2:
          title: Normes
          links:
            - name: Langage visuel
              url: /fr/design-language/
            - name: Logo
              url: /fr/logo/
        col3:
          title: Ressources
          links:
            - name: Marque et assets
              url: /fr/resources/downloads/
            - name: Medias sociaux
              url: /fr/resources/social-media/
        col4:
          title: Projet
          links:
            - name: Docs du site
              url: /fr/web-site/
            - name: Site principal
              url: https://www.vanityurls.link/fr/
              external: true
            - name: Code source
              url: https://github.com/vanityURLs/website
              external: true
    menu:
      main:
        - name: Langage visuel
          pageRef: /design-language
          weight: 1
        - name: Logo
          pageRef: /logo
          weight: 2
        - name: Ressources
          pageRef: /resources
          weight: 3
        - name: Interface produit
          pageRef: /product-ui
          weight: 4
        - name: Site web
          pageRef: /web-site
          weight: 5

params:
  siteKind: "brand"
  github: "https://github.com/vanityURLs/website"
  discussions: "https://github.com/orgs/vanityURLs/discussions"
  website_repo: "https://github.com/vanityURLs/website"
  editBaseURL: "https://github.com/vanityURLs/website/edit/main/brand-content"

sitemap:
  changefreq: weekly
  priority: 0.6
  filename: sitemap.xml

markup:
  highlight:
    style: "github"
    lineNos: false
    tabWidth: 2
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 2
    endLevel: 3
    ordered: false

outputs:
  home:
    - HTML
    - RSS
  section:
    - HTML
    - RSS
  page:
    - HTML

pagination:
  pagerSize: 9

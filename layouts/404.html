{{ define "main" }}
{{ $lang := .Site.Language.Lang }}
<div class="max-w-lg mx-auto px-4 py-24 text-center">

  <!-- Large 404 -->
  <div class="text-8xl font-black text-gray-100 dark:text-gray-800 select-none mb-2">404</div>

  <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100 mb-3">
    {{ i18n "not_found_title" }}
  </h1>
  <p class="text-gray-500 dark:text-gray-400 mb-8">
    {{ i18n "not_found_body" }}
  </p>

  <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
    <a href="{{ "/" | relLangURL }}"
       class="inline-flex items-center gap-2 px-5 py-2.5 rounded-lg
              bg-brand-700 hover:bg-brand-800 dark:bg-brand-800 dark:hover:bg-brand-700
              text-white font-medium text-sm transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      {{ i18n "not_found_home" }}
    </a>
    <a href="{{ "/docs/" | relLangURL }}"
       class="inline-flex items-center gap-2 px-5 py-2.5 rounded-lg
              border border-gray-200 dark:border-gray-700
              hover:border-brand-300 dark:hover:border-brand-700
              text-gray-700 dark:text-gray-300 font-medium text-sm transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 9.414V19a2 2 0 01-2 2z"/>
      </svg>
      {{ i18n "not_found_docs" }}
    </a>
  </div>

</div>
{{ end }}

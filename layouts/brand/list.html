{{ define "main" }}
<div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <div class="mb-8">
    <p class="text-sm font-semibold text-brand-700 dark:text-brand-400 uppercase tracking-wide">Brand standards</p>
    <h1 class="mt-2 text-3xl font-bold text-gray-900 dark:text-gray-100">{{ .Title }}</h1>
    {{ with .Description }}
    <p class="mt-3 max-w-2xl text-gray-600 dark:text-gray-400">{{ . }}</p>
    {{ end }}
  </div>
  <article class="content-flow docs-flow prose prose-gray dark:prose-invert max-w-none" data-pagefind-body>
    {{ .Content }}
  </article>
</div>
{{ end }}

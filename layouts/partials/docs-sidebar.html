{{ $currentPage := . }}
<nav class="w-64 shrink-0">
  <div class="sticky top-20 overflow-y-auto max-h-[calc(100vh-5rem)]">
    {{ range .Site.Data.docs_nav.sections }}
    <div class="mb-2">
      <p class="sidebar-section-title">{{ .title }}</p>
      {{ range .pages }}
      {{ $url := .url }}
      <a href="{{ $url }}"
         class="sidebar-link {{ if eq $currentPage.RelPermalink $url }}active{{ end }}">
        {{ .title }}
      </a>
      {{ end }}
    </div>
    {{ end }}
  </div>
</nav>

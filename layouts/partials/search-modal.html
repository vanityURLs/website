{{/* ── Search modal only ── rendered ONCE in baseof.html */}}
<div id="search-modal"
     class="hidden fixed inset-0 z-50 flex items-start justify-center pt-16 px-4"
     role="dialog" aria-modal="true" aria-label="{{ i18n "search_placeholder" }}">
  <div id="search-backdrop"
       class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm"></div>
  <div class="relative w-full max-w-2xl bg-white dark:bg-gray-800 rounded-xl shadow-2xl
              border border-gray-200 dark:border-gray-700 overflow-hidden">
    <div class="p-3 border-b border-gray-100 dark:border-gray-700 flex items-center gap-2">
      <svg class="w-4 h-4 text-gray-400 dark:text-gray-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <input id="search-input"
             type="search"
             placeholder="{{ i18n "search_placeholder" }}…"
             autocomplete="off"
             class="flex-1 bg-transparent text-gray-900 dark:text-gray-100
                    placeholder-gray-400 dark:placeholder-gray-500 text-sm
                    outline-none border-none focus:ring-0"
             aria-label="{{ i18n "search_placeholder" }}">
      <kbd class="px-1.5 py-0.5 text-xs text-gray-400 dark:text-gray-500
                  border border-gray-200 dark:border-gray-600 rounded font-mono">Esc</kbd>
    </div>
    <div id="search-results"
         class="overflow-y-auto max-h-96 divide-y divide-gray-100 dark:divide-gray-700">
      <p id="search-placeholder-msg"
         class="px-4 py-8 text-center text-sm text-gray-400 dark:text-gray-500">
        {{ i18n "search_placeholder" }}…
      </p>
    </div>
  </div>
</div>

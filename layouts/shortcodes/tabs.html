{{/* Parent: {{< tabs >}}...{{< /tabs >}}
     Tab switching wired up in /assets/js/app.js via the data-tabs attribute. */}}
{{ $id := printf "tabs-%s" (.Page.UniqueID | default (now.UnixNano | string)) }}
<div class="not-prose my-5" id="{{ $id }}" data-tabs>
  <div class="flex border-b border-gray-200 dark:border-gray-700 overflow-x-auto" data-tab-bar>
    <!-- Tab buttons injected by app.js -->
  </div>
  <div class="tab-panels">
    {{ .Inner }}
  </div>
</div>

name = 'vanityurls-website'
main = 'src/worker.mjs'
compatibility_date = '2026-04-01'

[build]
command = 'chmod a+x build.sh && ./build.sh'

[assets]
directory = './public'
binding = 'ASSETS'
not_found_handling = '404-page'
run_worker_first = [
  "/*",
  # Hugo build outputs
  "!/js/*",
  "!/css/*",
  "!/fonts/*",
  "!/pagefind/*",
  "!/.well-known/*",
  # Single-file static resources at the root
  "!/logo.svg",
  "!/favicon.ico",
  "!/humans.txt",
  "!/robots.txt",
  "!/sitemap.xml",
  "!/site.webmanifest",
  "!/social.png",
  "!/_redirects",
  # Per-language RSS/sitemap feeds
  "!/*/sitemap.xml",
  "!/*/index.xml",
  "!/**/index.xml",
]

[[routes]]
pattern = "vanityurls.link"
custom_domain = true

[observability]
[observability.logs]
enabled = true
invocation_logs = true

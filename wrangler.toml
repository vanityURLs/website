name = 'vanityurls'
main = 'src/worker.mjs'
compatibility_date = '2026-05-01'

[build]
command = 'chmod a+x build.sh && ./build.sh'

[vars]
CF_ACCESS_TEAM_DOMAIN = 'vanityurls.cloudflareaccess.com'

[assets]
directory = './public'
binding = 'ASSETS'
not_found_handling = '404-page'
run_worker_first = [
  "/*",
  # Hugo build outputs
  "!/js/*",
  "!/css/*",
  "!/fonts/*",
  "!/pagefind/*",
  "!/.well-known/*",
  # Single-file static resources at the root
  "!/logo.svg",
  "!/favicon.ico",
  "!/humans.txt",
  "!/site.webmanifest",
  "!/social.png",
  "!/_redirects",
]

[[routes]]
pattern = "vanityurls.link"
custom_domain = true

[[routes]]
pattern = "brand.vanityurls.link"
custom_domain = true

[observability]
[observability.logs]
enabled = true
invocation_logs = true
